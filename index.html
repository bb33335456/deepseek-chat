<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>私人写作平台 - 我的小说</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f5f5f0;
            --bg-secondary: #ffffff;
            --text-primary: #2c2c2c;
            --text-secondary: #6e6e6e;
            --border-color: #e0ded9;
            --accent-color: #8b5a2b;
            --accent-hover: #6d461f;
            --card-bg: #ffffff;
            --sidebar-bg: #faf9f5;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2a2a2a;
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0a0;
            --border-color: #3a3a3a;
            --accent-color: #c9a06c;
            --accent-hover: #e0b88c;
            --card-bg: #2a2a2a;
            --sidebar-bg: #222222;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* 登录页面 */
        .login-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #2c1810 0%, #1a0f0a 100%);
        }

        .login-box {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
        }

        .login-box h1 {
            margin-bottom: 10px;
            color: var(--accent-color);
        }

        .login-box p {
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .login-box input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 16px;
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
        }

        /* 主应用 */
        .app {
            display: none;
        }

        /* 顶部导航 */
        .navbar {
            position: sticky;
            top: 0;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            color: var(--accent-color);
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            color: var(--text-primary);
        }

        /* 主布局 */
        .main-layout {
            display: flex;
            height: calc(100vh - 56px);
        }

        /* 侧边栏（小说列表） */
        .sidebar {
            width: 300px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .new-novel-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
        }

        .novel-list {
            flex: 1;
            padding: 12px;
        }

        .novel-item {
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: background 0.2s;
        }

        .novel-item:hover {
            background: var(--bg-primary);
        }

        .novel-item.active {
            background: var(--bg-primary);
            border-left: 3px solid var(--accent-color);
        }

        .novel-title {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .novel-info {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* 主内容区 */
        .content-area {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* 章节列表 */
        .chapters-panel {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .chapters-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .new-chapter-btn {
            width: 100%;
            padding: 10px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
        }

        .chapters-list {
            flex: 1;
            padding: 12px;
        }

        .chapter-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chapter-item:hover {
            background: var(--bg-primary);
        }

        .chapter-item.active {
            background: var(--bg-primary);
        }

        .chapter-name {
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .chapter-delete {
            background: none;
            border: none;
            font-size: 14px;
            cursor: pointer;
            color: var(--text-secondary);
            opacity: 0;
        }

        .chapter-item:hover .chapter-delete {
            opacity: 1;
        }

        /* 编辑器 */
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .editor-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .chapter-title-input {
            font-size: 24px;
            font-weight: 600;
            background: none;
            border: none;
            color: var(--text-primary);
            padding: 8px;
            width: 300px;
            border-bottom: 2px solid transparent;
        }

        .chapter-title-input:focus {
            outline: none;
            border-bottom-color: var(--accent-color);
        }

        .word-count {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .editor-toolbar {
            padding: 8px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tool-btn {
            background: none;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-primary);
        }

        .editor-content {
            flex: 1;
            padding: 20px;
        }

        .editor-textarea {
            width: 100%;
            height: 100%;
            min-height: 500px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-primary);
            resize: none;
            font-family: inherit;
        }

        .editor-textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -300px;
                z-index: 200;
                transition: left 0.3s;
                height: 100%;
                top: 56px;
            }
            .sidebar.open {
                left: 0;
            }
            .chapters-panel {
                position: fixed;
                left: -280px;
                z-index: 200;
                transition: left 0.3s;
                height: 100%;
                top: 56px;
            }
            .chapters-panel.open {
                left: 0;
            }
            .menu-btn {
                display: block;
            }
        }

        .menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-primary);
            margin-right: 12px;
        }

        .save-status {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .novel-delete {
            background: none;
            border: none;
            font-size: 14px;
            cursor: pointer;
            color: var(--text-secondary);
            opacity: 0;
            float: right;
        }

        .novel-item:hover .novel-delete {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h1>📖 私人写作平台</h1>
            <p>输入密码进入你的创作空间</p>
            <input type="password" id="passwordInput" placeholder="密码" autocomplete="off">
            <button onclick="checkLogin()">进入</button>
        </div>
    </div>

    <!-- 主应用 -->
    <div class="app" id="app">
        <div class="navbar">
            <div style="display: flex; align-items: center;">
                <button class="menu-btn" id="menuBtn" onclick="toggleMobileSidebar()">☰</button>
                <div class="logo">📝 我的创作</div>
            </div>
            <div class="nav-buttons">
                <button class="icon-btn" onclick="toggleTheme()">🌙</button>
                <button class="icon-btn" onclick="exportAllData()">💾</button>
                <button class="icon-btn" onclick="logout()">🚪</button>
            </div>
        </div>

        <div class="main-layout">
            <!-- 左侧小说列表 -->
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <button class="new-novel-btn" onclick="createNewNovel()">+ 新建小说</button>
                </div>
                <div class="novel-list" id="novelList"></div>
            </div>

            <!-- 中间章节列表 -->
            <div class="content-area">
                <div class="chapters-panel" id="chaptersPanel">
                    <div class="chapters-header">
                        <button class="new-chapter-btn" onclick="createNewChapter()">+ 新建章节</button>
                    </div>
                    <div class="chapters-list" id="chaptersList"></div>
                </div>

                <!-- 右侧编辑器 -->
                <div class="editor-panel" id="editorPanel">
                    <div class="editor-header">
                        <input type="text" class="chapter-title-input" id="chapterTitle" placeholder="章节标题" onchange="saveCurrentChapter()">
                        <div class="word-count" id="wordCount">0字</div>
                    </div>
                    <div class="editor-toolbar">
                        <button class="tool-btn" onclick="insertFormat('bold')">B</button>
                        <button class="tool-btn" onclick="insertFormat('italic')">I</button>
                        <button class="tool-btn" onclick="insertFormat('heading')">H1</button>
                        <button class="tool-btn" onclick="insertFormat('heading2')">H2</button>
                        <button class="tool-btn" onclick="insertMarkdown('**', '**')">加粗</button>
                        <button class="tool-btn" onclick="insertMarkdown('*', '*')">斜体</button>
                        <button class="tool-btn" onclick="insertMarkdown('# ', '')">标题</button>
                        <button class="tool-btn" onclick="insertMarkdown('> ', '')">引用</button>
                        <button class="tool-btn" onclick="insertMarkdown('- ', '')">列表</button>
                        <button class="tool-btn" onclick="insertMarkdown('---\n', '')">分割线</button>
                    </div>
                    <div class="editor-content">
                        <textarea class="editor-textarea" id="chapterContent" placeholder="开始写作...&#10;&#10;支持Markdown格式：&#10;# 标题&#10;**加粗**&#10;*斜体*&#10;- 列表" oninput="updateWordCount(); autoSave()"></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== 密码配置 ==========
        // 修改这里的密码为你想要的！
        const CORRECT_PASSWORD = "xiaoshuo123";
        
        // ========== 数据存储 ==========
        let novels = [];
        let currentNovelId = null;
        let currentChapterId = null;
        let autoSaveTimer = null;

        // 加载数据
        function loadData() {
            const saved = localStorage.getItem('novels_data');
            if (saved) {
                novels = JSON.parse(saved);
            } else {
                // 示例数据
                novels = [
                    {
                        id: Date.now(),
                        name: "完结",
                        chapters: [
                            { id: Date.now() + 1, title: "第一章 开端", content: "这是一个开始...", createdAt: Date.now() },
                            { id: Date.now() + 2, title: "第二章 发展", content: "故事继续...", createdAt: Date.now() }
                        ],
                        createdAt: Date.now()
                    },
                    {
                        id: Date.now() + 3,
                        name: "犯规招惹",
                        chapters: [],
                        createdAt: Date.now()
                    },
                    {
                        id: Date.now() + 4,
                        name: "都杀了，做人没必要太正常",
                        chapters: [],
                        createdAt: Date.now()
                    }
                ];
            }
            renderNovelList();
        }

        // 保存数据
        function saveData() {
            localStorage.setItem('novels_data', JSON.stringify(novels));
        }

        // 渲染小说列表
        function renderNovelList() {
            const container = document.getElementById('novelList');
            container.innerHTML = novels.map(novel => `
                <div class="novel-item ${currentNovelId === novel.id ? 'active' : ''}" onclick="selectNovel('${novel.id}')">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <div class="novel-title">📖 ${escapeHtml(novel.name)}</div>
                            <div class="novel-info">${novel.chapters.length}章 · ${getTotalWords(novel)}字</div>
                        </div>
                        <button class="novel-delete" onclick="event.stopPropagation(); deleteNovel('${novel.id}')">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        // 获取小说总字数
        function getTotalWords(novel) {
            let total = 0;
            for (const chapter of novel.chapters) {
                total += chapter.content.replace(/\s/g, '').length;
            }
            return total;
        }

        // 选择小说
        function selectNovel(novelId) {
            currentNovelId = novelId;
            currentChapterId = null;
            renderNovelList();
            renderChaptersList();
            clearEditor();
        }

        // 渲染章节列表
        function renderChaptersList() {
            const novel = novels.find(n => n.id === currentNovelId);
            if (!novel) {
                document.getElementById('chaptersList').innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-secondary);">请先选择小说</div>';
                return;
            }
            
            const container = document.getElementById('chaptersList');
            container.innerHTML = novel.chapters.map((chapter, index) => `
                <div class="chapter-item ${currentChapterId === chapter.id ? 'active' : ''}" onclick="selectChapter('${chapter.id}')">
                    <span class="chapter-name">📄 ${index + 1}. ${escapeHtml(chapter.title)}</span>
                    <button class="chapter-delete" onclick="event.stopPropagation(); deleteChapter('${chapter.id}')">🗑️</button>
                </div>
            `).join('');
            
            if (novel.chapters.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-secondary);">暂无章节，点击新建</div>';
            }
        }

        // 选择章节
        function selectChapter(chapterId) {
            currentChapterId = chapterId;
            const novel = novels.find(n => n.id === currentNovelId);
            const chapter = novel?.chapters.find(c => c.id === chapterId);
            if (chapter) {
                document.getElementById('chapterTitle').value = chapter.title;
                document.getElementById('chapterContent').value = chapter.content;
                updateWordCount();
            }
            renderChaptersList();
        }

        // 清空编辑器
        function clearEditor() {
            document.getElementById('chapterTitle').value = '';
            document.getElementById('chapterContent').value = '';
            updateWordCount();
        }

        // 保存当前章节
        function saveCurrentChapter() {
            if (!currentNovelId || !currentChapterId) return;
            
            const novel = novels.find(n => n.id === currentNovelId);
            const chapter = novel?.chapters.find(c => c.id === currentChapterId);
            if (chapter) {
                chapter.title = document.getElementById('chapterTitle').value || '无标题';
                chapter.content = document.getElementById('chapterContent').value;
                chapter.updatedAt = Date.now();
                saveData();
                renderNovelList();
                renderChaptersList();
                showSaveStatus();
            }
        }

        // 自动保存
        function autoSave() {
            if (autoSaveTimer) clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => {
                saveCurrentChapter();
            }, 2000);
        }

        // 显示保存状态
        function showSaveStatus() {
            const status = document.getElementById('saveStatus');
            if (status) {
                status.textContent = '已保存';
                setTimeout(() => {
                    status.textContent = '';
                }, 1500);
            }
        }

        // 更新字数统计
        function updateWordCount() {
            const content = document.getElementById('chapterContent').value;
            const words = content.replace(/\s/g, '').length;
            document.getElementById('wordCount').textContent = words + '字';
        }

        // 新建小说
        function createNewNovel() {
            const name = prompt('请输入小说名称');
            if (name && name.trim()) {
                const newNovel = {
                    id: Date.now(),
                    name: name.trim(),
                    chapters: [],
                    createdAt: Date.now()
                };
                novels.push(newNovel);
                saveData();
                renderNovelList();
                selectNovel(newNovel.id);
            }
        }

        // 删除小说
        function deleteNovel(novelId) {
            if (confirm('确定要删除这本小说吗？所有章节也会被删除！')) {
                novels = novels.filter(n => n.id !== novelId);
                if (currentNovelId === novelId) {
                    currentNovelId = null;
                    currentChapterId = null;
                    clearEditor();
                }
                saveData();
                renderNovelList();
                renderChaptersList();
            }
        }

        // 新建章节
        function createNewChapter() {
            if (!currentNovelId) {
                alert('请先选择一本小说');
                return;
            }
            
            const title = prompt('请输入章节标题');
            const novel = novels.find(n => n.id === currentNovelId);
            if (title && title.trim() && novel) {
                const newChapter = {
                    id: Date.now(),
                    title: title.trim(),
                    content: '',
                    createdAt: Date.now()
                };
                novel.chapters.push(newChapter);
                saveData();
                renderChaptersList();
                selectChapter(newChapter.id);
            }
        }

        // 删除章节
        function deleteChapter(chapterId) {
            if (confirm('确定要删除这个章节吗？')) {
                const novel = novels.find(n => n.id === currentNovelId);
                if (novel) {
                    novel.chapters = novel.chapters.filter(c => c.id !== chapterId);
                    if (currentChapterId === chapterId) {
                        currentChapterId = null;
                        clearEditor();
                    }
                    saveData();
                    renderChaptersList();
                    renderNovelList();
                }
            }
        }

        // 插入格式
        function insertFormat(type) {
            const textarea = document.getElementById('chapterContent');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const selected = textarea.value.substring(start, end);
            let replacement = '';
            
            switch(type) {
                case 'bold':
                    replacement = `**${selected}**`;
                    break;
                case 'italic':
                    replacement = `*${selected}*`;
                    break;
                case 'heading':
                    replacement = `# ${selected}`;
                    break;
                case 'heading2':
                    replacement = `## ${selected}`;
                    break;
            }
            
            textarea.value = textarea.value.substring(0, start) + replacement + textarea.value.substring(end);
            textarea.selectionStart = start;
            textarea.selectionEnd = start + replacement.length;
            textarea.focus();
            updateWordCount();
            autoSave();
        }

        function insertMarkdown(prefix, suffix) {
            const textarea = document.getElementById('chapterContent');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const selected = textarea.value.substring(start, end);
            const replacement = prefix + selected + suffix;
            
            textarea.value = textarea.value.substring(0, start) + replacement + textarea.value.substring(end);
            textarea.selectionStart = start + prefix.length;
            textarea.selectionEnd = start + prefix.length + selected.length;
            textarea.focus();
            updateWordCount();
            autoSave();
        }

        // 导出数据
        function exportAllData() {
            const dataStr = JSON.stringify(novels, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `novels_backup_${new Date().toLocaleDateString()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            alert('导出成功！文件保存在下载文件夹');
        }

        // 主题切换
        function toggleTheme() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('writing_theme', 'light');
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('writing_theme', 'dark');
            }
        }

        // 登录检查
        function checkLogin() {
            const password = document.getElementById('passwordInput').value;
            if (password === CORRECT_PASSWORD) {
                localStorage.setItem('writing_logged_in', 'true');
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                loadData();
            } else {
                alert('密码错误！');
            }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('writing_logged_in');
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
            document.getElementById('passwordInput').value = '';
        }

        // 移动端菜单
        function toggleMobileSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 加载主题
        function loadTheme() {
            const savedTheme = localStorage.getItem('writing_theme');
            if (savedTheme === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
            }
        }

        // 检查登录状态
        function checkLoginStatus() {
            const loggedIn = localStorage.getItem('writing_logged_in');
            if (loggedIn === 'true') {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                loadData();
            } else {
                document.getElementById('loginContainer').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
            }
        }

        // 初始化
        loadTheme();
        checkLoginStatus();
    </script>
</body>
</html>
