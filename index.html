<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>私人写作平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f0;
            height: 100vh;
            overflow: hidden;
        }
        /* 登录页面 */
        .login-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2c1810, #1a0f0a);
            z-index: 1000;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            width: 300px;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #8b5a2b;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        /* 主应用 */
        .app {
            display: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            background: white;
            border-bottom: 1px solid #e0ded9;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 18px;
            font-weight: 600;
            color: #8b5a2b;
        }
        .icon-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 6px;
        }
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background: #faf9f5;
            border-right: 1px solid #e0ded9;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #e0ded9;
        }
        .new-novel-btn {
            width: 100%;
            padding: 10px;
            background: #8b5a2b;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .novel-list {
            flex: 1;
            padding: 12px;
        }
        .novel-item {
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 8px;
            background: white;
        }
        .novel-item.active {
            background: #e8e0d5;
            border-left: 3px solid #8b5a2b;
        }
        .novel-title {
            font-weight: 500;
        }
        .novel-info {
            font-size: 12px;
            color: #999;
        }
        /* 章节面板 */
        .chapters-panel {
            width: 260px;
            background: #faf9f5;
            border-right: 1px solid #e0ded9;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .chapters-header {
            padding: 16px;
            border-bottom: 1px solid #e0ded9;
        }
        .new-chapter-btn {
            width: 100%;
            padding: 10px;
            background: #8b5a2b;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .chapters-list {
            flex: 1;
            padding: 12px;
        }
        .chapter-item {
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 6px;
            background: white;
        }
        .chapter-item.active {
            background: #e8e0d5;
        }
        /* 编辑器 */
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: white;
        }
        .editor-header {
            padding: 16px;
            border-bottom: 1px solid #e0ded9;
        }
        .chapter-title-input {
            width: 100%;
            font-size: 20px;
            font-weight: bold;
            border: none;
            padding: 8px 0;
            outline: none;
        }
        .word-count {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }
        .editor-content {
            flex: 1;
            padding: 16px;
        }
        .editor-textarea {
            width: 100%;
            height: 100%;
            min-height: 400px;
            border: 1px solid #e0ded9;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            line-height: 1.6;
            resize: none;
            font-family: inherit;
        }
        .empty-tip {
            padding: 40px;
            text-align: center;
            color: #999;
        }
        @media (max-width: 700px) {
            .sidebar, .chapters-panel {
                position: fixed;
                left: -280px;
                z-index: 200;
                height: 100%;
                background: white;
            }
            .sidebar.open, .chapters-panel.open {
                left: 0;
            }
            .menu-btn {
                display: inline-block;
            }
        }
        .menu-btn {
            display: none;
            font-size: 24px;
            background: none;
            border: none;
            margin-right: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h2>📖 私人写作平台</h2>
            <input type="password" id="passwordInput" placeholder="密码">
            <button onclick="checkLogin()">进入</button>
        </div>
    </div>

    <div class="app" id="app">
        <div class="navbar">
            <div style="display: flex; align-items: center;">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                <div class="logo">📝 我的创作</div>
            </div>
            <div>
                <button class="icon-btn" onclick="toggleTheme()">🌙</button>
                <button class="icon-btn" onclick="exportData()">💾</button>
            </div>
        </div>

        <div class="main-layout">
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <button class="new-novel-btn" onclick="createNovel()">+ 新建小说</button>
                </div>
                <div class="novel-list" id="novelList"></div>
            </div>

            <div class="chapters-panel" id="chaptersPanel">
                <div class="chapters-header">
                    <button class="new-chapter-btn" onclick="createChapter()">+ 新建章节</button>
                </div>
                <div class="chapters-list" id="chaptersList">
                    <div class="empty-tip">请先选择小说</div>
                </div>
            </div>

            <div class="editor-panel" id="editorPanel">
                <div class="editor-header">
                    <input type="text" class="chapter-title-input" id="chapterTitle" placeholder="章节标题" onchange="saveChapter()">
                    <div class="word-count" id="wordCount">0字</div>
                </div>
                <div class="editor-content">
                    <textarea class="editor-textarea" id="chapterContent" placeholder="开始写作..." oninput="updateWordCount(); autoSave()"></textarea>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PASSWORD = "xiaoshuo123";
        let novels = [];
        let currentNovelId = null;
        let currentChapterId = null;
        let saveTimer = null;

        function checkLogin() {
            if (document.getElementById('passwordInput').value === PASSWORD) {
                localStorage.setItem('logged_in', 'true');
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                loadData();
            } else {
                alert('密码错误');
            }
        }

        function loadData() {
            const saved = localStorage.getItem('novels');
            if (saved) {
                novels = JSON.parse(saved);
            } else {
                novels = [];
            }
            renderNovels();
        }

        function saveAllData() {
            localStorage.setItem('novels', JSON.stringify(novels));
            renderNovels();
        }

        function renderNovels() {
            const container = document.getElementById('novelList');
            container.innerHTML = novels.map(novel => `
                <div class="novel-item ${currentNovelId === novel.id ? 'active' : ''}" onclick="selectNovel('${novel.id}')">
                    <div class="novel-title">📖 ${escapeHtml(novel.name)}</div>
                    <div class="novel-info">${novel.chapters.length}章 · ${getWordCount(novel)}字</div>
                </div>
            `).join('');
        }

        function getWordCount(novel) {
            let total = 0;
            for (const ch of novel.chapters) {
                total += ch.content.replace(/\s/g, '').length;
            }
            return total;
        }

        function selectNovel(novelId) {
            currentNovelId = novelId;
            currentChapterId = null;
            renderNovels();
            renderChapters();
            clearEditor();
        }

        function renderChapters() {
            const novel = novels.find(n => n.id === currentNovelId);
            const container = document.getElementById('chaptersList');
            if (!novel) {
                container.innerHTML = '<div class="empty-tip">请先选择小说</div>';
                return;
            }
            if (novel.chapters.length === 0) {
                container.innerHTML = '<div class="empty-tip">暂无章节，点击上方新建</div>';
                return;
            }
            container.innerHTML = novel.chapters.map((ch, idx) => `
                <div class="chapter-item ${currentChapterId === ch.id ? 'active' : ''}" onclick="selectChapter('${ch.id}')">
                    📄 ${idx+1}. ${escapeHtml(ch.title)}
                </div>
            `).join('');
        }

        function selectChapter(chapterId) {
            currentChapterId = chapterId;
            const novel = novels.find(n => n.id === currentNovelId);
            const chapter = novel?.chapters.find(c => c.id === chapterId);
            if (chapter) {
                document.getElementById('chapterTitle').value = chapter.title;
                document.getElementById('chapterContent').value = chapter.content;
                updateWordCount();
            }
            renderChapters();
        }

        function clearEditor() {
            document.getElementById('chapterTitle').value = '';
            document.getElementById('chapterContent').value = '';
            updateWordCount();
        }

        function updateWordCount() {
            const content = document.getElementById('chapterContent').value;
            const count = content.replace(/\s/g, '').length;
            document.getElementById('wordCount').textContent = count + '字';
        }

        function saveChapter() {
            if (!currentNovelId || !currentChapterId) return;
            const novel = novels.find(n => n.id === currentNovelId);
            const chapter = novel?.chapters.find(c => c.id === currentChapterId);
            if (chapter) {
                chapter.title = document.getElementById('chapterTitle').value || '无标题';
                chapter.content = document.getElementById('chapterContent').value;
                saveAllData();
                renderChapters();
            }
        }

        function autoSave() {
            if (saveTimer) clearTimeout(saveTimer);
            saveTimer = setTimeout(() => saveChapter(), 1500);
        }

        function createNovel() {
            const name = prompt('小说名称');
            if (name && name.trim()) {
                novels.push({
                    id: Date.now(),
                    name: name.trim(),
                    chapters: []
                });
                saveAllData();
            }
        }

        function createChapter() {
            if (!currentNovelId) {
                alert('请先选择一本小说');
                return;
            }
            const title = prompt('章节标题');
            if (title && title.trim()) {
                const novel = novels.find(n => n.id === currentNovelId);
                const newChapter = {
                    id: Date.now(),
                    title: title.trim(),
                    content: ''
                };
                novel.chapters.push(newChapter);
                saveAllData();
                renderChapters();
                selectChapter(newChapter.id);
            }
        }

        function exportData() {
            const dataStr = JSON.stringify(novels);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `novels_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function toggleTheme() {
            alert('主题切换功能开发中');
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        if (localStorage.getItem('logged_in') === 'true') {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            loadData();
        }
    </script>
</body>
</html>
